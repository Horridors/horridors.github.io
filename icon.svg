<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Horridors">
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a0512"/>

  <!-- Corridor perspective walls -->
  <g opacity="0.55">
    <path d="M 40 472 L 240 276 L 272 276 L 472 472 Z" fill="#1a0f2e"/>
    <path d="M 40 40 L 240 236 L 272 236 L 472 40 Z" fill="#140a24"/>
  </g>

  <!-- Warm torch halo behind Chester -->
  <circle cx="256" cy="250" r="145" fill="#ffb347" opacity="0.22"/>
  <circle cx="256" cy="250" r="95" fill="#ffd94a" opacity="0.28"/>

  <!-- Chester the boy (boxy, brave) -->
  <g transform="translate(256 260)">
    <!-- Cape -->
    <path d="M -52 -64 L -90 60 L -50 34 Z" fill="#ff3a4a"/>
    <path d="M 52 -64 L 90 60 L 50 34 Z" fill="#ff3a4a"/>
    <!-- Body (bright yellow) -->
    <rect x="-52" y="-68" width="104" height="132" rx="20" ry="20"
          fill="#ffd94a" stroke="#5a3a08" stroke-width="8"/>
    <!-- Highlight -->
    <rect x="-40" y="-58" width="80" height="18" rx="8" ry="8" fill="#fff0a8" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="-20" cy="-26" r="9" fill="#120a24"/>
    <circle cx="20" cy="-26" r="9" fill="#120a24"/>
    <circle cx="-17" cy="-29" r="3" fill="#ffffff"/>
    <circle cx="23" cy="-29" r="3" fill="#ffffff"/>
    <!-- Brave smile -->
    <path d="M -18 14 Q 0 30 18 14" stroke="#120a24" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Glowing red eyes lurking in the corners -->
  <circle cx="96" cy="130" r="7" fill="#ff3a4a"/>
  <circle cx="118" cy="130" r="7" fill="#ff3a4a"/>
  <circle cx="394" cy="118" r="7" fill="#ff3a4a"/>
  <circle cx="416" cy="118" r="7" fill="#ff3a4a"/>

  <!-- Title banner -->
  <rect x="56" y="406" width="400" height="70" rx="14" ry="14" fill="#0a0510" stroke="#ffd94a" stroke-width="4"/>
  <text x="256" y="455" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica', sans-serif"
        font-size="46" font-weight="900"
        fill="#ffd94a" letter-spacing="4">HORRIDORS</text>
</svg>
